      paragraphs: [
        {en: "China's Gen Z is turning travel into a non-stop challenge. Oneone Han and Pipi Tang landed in Hong Kong before the sun came up. They took a quick shower in the airport bathroom, their eyes still heavy from the red-eye flight. By 6 a.m., they were already rushing out to their first attraction, full of energy. With just two days and a limited budget, they hit 14 popular places and spent only about $360 in total.", zh: "中国的Z世代正在将旅行变成一场不间断的挑战。韩一一和唐皮皮在太阳升起之前就降落在了香港。他们在机场浴室快速冲了个澡，眼睛里还满是红眼航班带来的疲惫。到了早上6点，他们已经精力充沛地冲向第一个景点。仅用两天时间和有限的预算，他们打卡了14个热门景点，总共只花了大约360美元。"},
        {en: "This intense way of traveling is known as \"special forces\" travel. It is named after elite military units that value speed and smart planning. Young travelers love it because it allows them to visit as many places as possible in a short, low-cost trip.", zh: "这种高强度的旅行方式被称为'特种兵式旅游'。它以重视速度和巧妙规划的精锐部队命名。年轻旅行者喜欢这种方式，因为它让他们能够在短时间、低成本的旅行中游览尽可能多的地方。"},
        {en: "Most people make their trip work with the help of China's high-speed rail network. Taking overnight sleeper trains saves money on hotels and keeps the daytime free for sightseeing. Besides, on social media platforms, people share useful and detailed tips. They list the fastest subway lines, the best free photo spots, and cheap snacks from convenience stores. Some share places to rest overnight, like 24-hour McDonald's. Following this tip, Lin Dan slept one night at McDonald's although she said it felt too uncomfortable to do it again.", zh: "大多数人借助中国的高铁网络来完成他们的旅行。乘坐夜间卧铺列车可以节省酒店费用，并将白天留给观光。此外，在社交媒体平台上，人们分享有用且详细的攻略。他们列出最快的地铁线路、最佳的免费拍照点，以及便利店里的便宜小吃。有些人还分享过夜的休息地点，比如24小时营业的麦当劳。循着这条攻略，林丹在麦当劳睡了一晚，不过她说那感觉太不舒服了，不会再尝试。"},

      ],
      article: `China's Gen Z is turning travel into a non-stop challenge. Oneone Han and Pipi Tang landed in Hong Kong before the sun came up. They took a quick shower in the airport bathroom, their eyes still heavy from the red-eye flight. By 6 a.m., they were already rushing out to their first attraction, full of energy. With just two days and a limited budget, they hit 14 popular places and spent only about $360 in total.\n\nThis intense way of traveling is known as "special forces" travel. It is named after elite military units that value speed and smart planning. Young travelers love it because it allows them to visit as many places as possible in a short, low-cost trip.\n\nMost people make their trip work with the help of China's high-speed rail network. Taking overnight sleeper trains saves money on hotels and keeps the daytime free for sightseeing. Besides, on social media platforms, people share useful and detailed tips. They list the fastest subway lines, the best free photo spots, and cheap snacks from convenience stores. Some share places to rest overnight, like 24-hour McDonald's. Following this tip, Lin Dan slept one night at McDonald's although she said it felt too uncomfortable to do it again.\n\nExperts say "special forces" travel comes from busy lives, limited budgets, and a strong wish to embrace new experiences right away. Young people want to make good memories today instead of waiting for the future. "Attractions should offer more choices, such as self-guided walks," said experts. Some areas are already redesigning their travel plans to better suit this young, energetic crowd.`,

      paragraphs: [
        {en: "Nowadays, many people are using AI to find out their medical problems and help them decide when to see a doctor. AI companies have even developed chatbots that focus on such problems, and some have passed medical exams that human doctors take. However, a new study, led by experts at Oxford University and the Oxford Internet Institute in England, shows that AI chatbots aren't very useful when a real person asks for help.", zh: "如今，许多人正在使用AI来了解自己的健康问题，并帮助他们决定何时去看医生。AI公司甚至开发了专注于这类问题的聊天机器人，其中一些还通过了人类医生参加的医学考试。然而，牛津大学和英国牛津互联网研究所的专家主导的一项新研究表明，当真实的人寻求帮助时，AI聊天机器人并不是很有用。"},
        {en: "Almost 1,300 people took part in the study. Each was given certain health problems, including a list of symptoms and a medical history. For example, one person was told to pretend they had a headache. Then, the people were divided into two groups. One group could ask AI to find out their illness and decide what to do next. The other group used the internet and Google to do the same thing. Real doctors then checked whether the volunteers made the right decisions.", zh: "近1300人参与了这项研究。每个人都被告知了特定的健康问题，包括一系列症状和病史。例如，有一个人被要求假装自己头痛。然后，参与者被分成两组。一组可以向AI询问自己的病情并决定下一步该怎么做。另一组则使用互联网和谷歌来做同样的事情。随后，真正的医生检查了志愿者们是否做出了正确的决定。"},
        {en: "The results of the study showed that less than half of the AI users did the right thing. In only one-third of the cases, the AI correctly found the problem. In fact, the AI's advice was even no better than just using Google.", zh: "研究结果显示，不到一半的AI用户做出了正确的选择。在仅有三分之一的案例中，AI正确发现了问题。事实上，AI的建议甚至并不比仅仅使用谷歌好多少。"},
        {en: "\"AI just isn't ready to take on the role of a medical expert,\" said Dr Rebecca Payne, one of the authors of the study. She said that asking an AI for health advice can be dangerous. They might give wrong information and fail to recognize when immediate help is needed. \"We hope this work will contribute to the development of safer and more useful AI systems,\" said Andrew Bean, who led the study.", zh: "'AI还没有准备好扮演医学专家的角色，'研究报告作者之一丽贝卡·佩恩博士说。她表示，向AI寻求健康建议可能是危险的。它们可能提供错误信息，并且无法识别何时需要立即就医。'我们希望这项工作能为更安全、更有用的AI系统的发展做出贡献，'该研究的负责人安德鲁·比恩说。"}
      ],
      article: `Nowadays, many people are using AI to find out their medical problems and help them decide when to see a doctor. AI companies have even developed chatbots that focus on such problems, and some have passed medical exams that human doctors take. However, a new study, led by experts at Oxford University and the Oxford Internet Institute in England, shows that AI chatbots aren't very useful when a real person asks for help.\n\nAlmost 1,300 people took part in the study. Each was given certain health problems, including a list of symptoms and a medical history. For example, one person was told to pretend they had a headache. Then, the people were divided into two groups. One group could ask AI to find out their illness and decide what to do next. The other group used the internet and Google to do the same thing. Real doctors then checked whether the volunteers made the right decisions.\n\nThe results of the study showed that less than half of the AI users did the right thing. In only one-third of the cases, the AI correctly found the problem. In fact, the AI's advice was even no better than just using Google.\n\n"AI just isn't ready to take on the role of a medical expert," said Dr Rebecca Payne, one of the authors of the study. She said that asking an AI for health advice can be dangerous. They might give wrong information and fail to recognize when immediate help is needed. "We hope this work will contribute to the development of safer and more useful AI systems," said Andrew Bean, who led the study.`,
      questions: [
        {num: 16, stem: "What do people use AI to do according to Paragraph 1?", answer: "D", options: {A: "To develop chatbots.", B: "To carry out a study.", C: "To pass medical exams.", D: "To make health decisions."}, point: "细节理解题", analysis: "根据第一段'Nowadays, many people are using AI to find out their medical problems and help them decide when to see a doctor.'可知，人们用AI来辅助做出健康决策。", evidence: "Nowadays, many people are using AI to find out their medical problems and help them decide when to see a doctor.", evidenceKeywords: ["find out their medical problems", "help them decide"], distractors: "A. 开发聊天机器人——是AI公司的行为；B. 开展研究——是专家的行为；C. 通过医学考试——是部分聊天机器人的表现，均非'人们'使用AI的目的。"},
        {num: 17, stem: "What is Paragraph 2 mainly about?", answer: "A", options: {A: "The steps of the study.", B: "The people attending the study.", C: "The tools used in the study.", D: "The common health problems."}, point: "段落大意题", analysis: "第二段依次介绍了：近1300人参与→每人被赋予特定健康问题→分为两组（AI组 vs 谷歌组）→医生核查决策是否正确。这是典型的'研究步骤/过程'描述。", evidence: "全段：Almost 1,300 people took part... Each was given... divided into two groups... Real doctors then checked...", evidenceKeywords: ["took part", "given", "divided into", "checked"], distractors: "B. 参与人员——仅为开头信息；C. 使用工具——仅为分组信息；D. 常见健康问题——仅为背景设定。"},
        {num: 18, stem: "What can we infer from the study results?", answer: "C", options: {A: "AI chatbots should be stopped using soon.", B: "Google is useless in solving health problems.", C: "People shouldn't depend on AI for medical advice.", D: "AI performed better than human doctors in the study."}, point: "推理判断题", analysis: "根据研究结果：'less than half of the AI users did the right thing'、'In only one-third of the cases, the AI correctly found the problem'、'AI's advice was even no better than just using Google'，可推断人们不应依赖AI获取医疗建议。", evidence: "less than half of the AI users did the right thing... In only one-third of the cases... AI's advice was even no better than just using Google", evidenceKeywords: ["less than half", "one-third", "no better than"], distractors: "A. 立即停用——过于绝对；B. 谷歌无用——原文说AI不比谷歌好，即谷歌同样有一定作用；D. AI优于医生——与原文相反。"},
        {num: 19, stem: "Why are Andrew Bean's words mentioned in Paragraph 4?", answer: "A", options: {A: "To show his hope for the future.", B: "To show his worry about the study.", C: "To show his agreement with Dr Payne.", D: "To show his dissatisfaction with the work."}, point: "写作意图题", analysis: "Andrew Bean的话'We hope this work will contribute to the development of safer and more useful AI systems'明确表达了对未来的期望。", evidence: "We hope this work will contribute to the development of safer and more useful AI systems", evidenceKeywords: ["hope", "contribute", "safer and more useful"], distractors: "B. 担忧——语气积极；C. 同意——虽是事实，但引述目的非为表示同意，而是表达希望；D. 不满——与原文积极态度相反。"},
        {num: 20, stem: "In which part of the newspaper could this passage be found?", answer: "B", options: {A: "Business.", B: "Science.", C: "Fashion.", D: "Education."}, point: "文章出处题", analysis: "本文是关于AI医疗聊天机器人的科学研究报告，涉及牛津大学的研究数据、实验结果和专家观点，最可能出现在报纸的'科学'版块。", evidence: "a new study, led by experts at Oxford University... The results of the study showed...", evidenceKeywords: ["study", "Oxford University", "results"], distractors: "A. Business——非商业话题；C. Fashion——与时尚无关；D. Education——非教育主题。"}

    {
      id: "reading_c",

      paragraphs: [
        {en: "On March 21, 26 international students from Shenzhen University visited the OCT Wetland Park, exploring a key resting site for migratory birds in central Shenzhen. This event was the start of the 2026 \"APEC China Year: International Students in Ecological Shenzhen\" program. By bringing together young people from around the world to take part in hands-on science activities, the program aims to encourage the exchange of ideas on environmental protection.", zh: "3月21日，来自深圳大学的26名国际学生参观了华侨城湿地公园，探索深圳中部一个重要的候鸟栖息地。此次活动是2026年'APEC中国年：国际学生在生态深圳'项目的开端。通过将来自世界各地的年轻人聚集在一起参与动手科学活动，该项目旨在促进环境保护理念的交流。"},
        {en: "At the wetland's ecology exhibition hall, environmental volunteer educator Xie Yunwen gave a detailed introduction to wetland ecology. From her talk, students learned about how mangroves survive with unique methods. Her presentation also covered successful efforts to protect bird populations. To help students understand how city ecological spaces can be rebuilt and taken good care of, she talked about the development of the OCT wetland as well.", zh: "在湿地公园的生态展示厅，环保志愿者讲师谢云雯详细介绍了湿地生态。通过她的讲解，学生们了解到红树林如何以独特的方式生存。她的讲座还涵盖了保护鸟类种群的成功努力。为了帮助学生理解城市生态空间如何被重建和妥善管理，她还谈到了华侨城湿地的发展历程。"},
        {en: "After the exhibition, students were divided into two groups for an outdoor birdwatching activity. Guided by volunteer educators Chen Hui-ting and He Zhanzhi, they observed and recorded the nesting and feeding behaviors of more than 10 wetland bird types.", zh: "展览结束后，学生们被分成两组进行户外观鸟活动。在志愿者讲师陈惠婷和何展志的带领下，他们观察并记录了10多种湿地鸟类的筑巢和觅食行为。"},
        {en: "During the discussion, students connected the day's learning with their own environmental experiences. Yulia, a student from Russia, compared waste-sorting rules across different countries and suggested that for ordinary people, we should begin by reducing plastic use. Milana, another Russian student with experience in bird research in Northern Europe, said that the OCT wetland offers excellent conditions for bird protection.", zh: "在讨论环节中，学生们将当天的所学与自己的环保经历联系起来。来自俄罗斯的学生Yulia比较了不同国家的垃圾分类规则，并建议对于普通人来说，我们应该从减少塑料使用开始。另一位来自俄罗斯的学生Milana拥有北欧鸟类研究经验，她表示华侨城湿地为鸟类保护提供了极佳的条件。"},
        {en: "According to the organizers, the series will continue through November. Future visits will be timed to mark major international milestones, including World Earth Day and World Environment Day.", zh: "据主办方介绍，该系列活动将持续到11月。未来的参观将恰逢重大国际里程碑时刻，包括世界地球日和世界环境日。"}
      ],
      article: `On March 21, 26 international students from Shenzhen University visited the OCT Wetland Park, exploring a key resting site for migratory birds in central Shenzhen. This event was the start of the 2026 "APEC China Year: International Students in Ecological Shenzhen" program. By bringing together young people from around the world to take part in hands-on science activities, the program aims to encourage the exchange of ideas on environmental protection.\n\nAt the wetland's ecology exhibition hall, environmental volunteer educator Xie Yunwen gave a detailed introduction to wetland ecology. From her talk, students learned about how mangroves survive with unique methods. Her presentation also covered successful efforts to protect bird populations. To help students understand how city ecological spaces can be rebuilt and taken good care of, she talked about the development of the OCT wetland as well.\n\nAfter the exhibition, students were divided into two groups for an outdoor birdwatching activity. Guided by volunteer educators Chen Hui-ting and He Zhanzhi, they observed and recorded the nesting and feeding behaviors of more than 10 wetland bird types.\n\nDuring the discussion, students connected the day's learning with their own environmental experiences. Yulia, a student from Russia, compared waste-sorting rules across different countries and suggested that for ordinary people, we should begin by reducing plastic use. Milana, another Russian student with experience in bird research in Northern Europe, said that the OCT wetland offers excellent conditions for bird protection.\n\nAccording to the organizers, the series will continue through November. Future visits will be timed to mark major international milestones, including World Earth Day and World Environment Day.`,
      questions: [
        {num: 21, stem: "What can we learn about the program from Paragraph 1?", answer: "A", options: {A: "Its purpose.", B: "Its problem.", C: "Its requirement.", D: "Its development."}, point: "细节理解题", analysis: "第一段最后一句'the program aims to encourage the exchange of ideas on environmental protection'明确说明了该项目的目的（purpose）。", evidence: "the program aims to encourage the exchange of ideas on environmental protection", evidenceKeywords: ["aims to", "encourage the exchange"], distractors: "B. 问题——未提及；C. 要求——未提及；D. 发展——是后文信息。"},
        {num: 22, stem: "What is Paragraph 2 mainly about?", answer: "B", options: {A: "The history of the OCT Wetland.", B: "The topics Xie covered in her talk.", C: "The introduction of the exhibition hall.", D: "The different ways mangroves survive."}, point: "段落大意题", analysis: "第二段按顺序介绍了谢云雯讲解的内容：湿地生态、红树林独特生存方式、鸟类保护成果、华侨城湿地的发展过程。这些都是她讲座中'涵盖的主题'。", evidence: "gave a detailed introduction to wetland ecology... how mangroves survive... successful efforts to protect bird populations... the development of the OCT wetland", evidenceKeywords: ["introduction to wetland ecology", "how mangroves survive", "protect bird populations"], distractors: "A. 历史——仅一部分；C. 展厅介绍——是地点，非内容；D. 红树林生存方式——仅一部分。"},
        {num: 23, stem: "What does the underlined word \"they\" refer to?", answer: "C", options: {A: "Wetland bird types.", B: "Volunteer educators.", C: "International students.", D: "Nesting and feeding behaviors."}, point: "代词指代题", analysis: "根据前文'students were divided into two groups... Guided by volunteer educators... they observed...'，they 指代的是前文的主语 students（即 international students）。", evidence: "students were divided into two groups for an outdoor birdwatching activity. Guided by volunteer educators... they observed and recorded...", evidenceKeywords: ["students", "Guided by volunteer educators", "they observed"], distractors: "A. 湿地鸟类类型——是观察对象；B. 志愿者教育工作者——是引导者；D. 筑巢和觅食行为——是观察内容。"},
        {num: 24, stem: "How should ordinary people protect the environment according to Yulia?", answer: "C", options: {A: "By researching bird protection.", B: "By learning waste-sorting rules.", C: "By using fewer plastic products.", D: "By comparing wetland conditions."}, point: "细节理解题", analysis: "根据第四段Yulia的话'we should begin by reducing plastic use'可知，普通人应从减少塑料使用做起。", evidence: "Yulia... suggested that for ordinary people, we should begin by reducing plastic use", evidenceKeywords: ["ordinary people", "reducing plastic use"], distractors: "A. 研究鸟类保护——是Milana的行为；B. 学习垃圾分类规则——是她比较的内容，非建议；D. 比较湿地条件——未提及。"},
        {num: 25, stem: "What is the structure of the text?", answer: "（见解析）", options: {A: "Structure A", B: "Structure B", C: "Structure C", D: "Structure D"}, point: "篇章结构题", analysis: "文章结构：第一段总起（介绍活动背景与目的）；第二、三、四段分述（展厅介绍、户外观鸟、学生讨论）；第五段总结（活动将持续至11月）。全文为'总—分—总'结构。具体选项需对照试卷图示选择。", evidence: "全文结构：总（第1段）→ 分（第2-4段）→ 总（第5段）", evidenceKeywords: ["start", "detailed introduction", "divided into", "continue"], distractors: ""}

    {

      paragraphs: [
        {en: "Saving money can be challenging for teenagers, especially when there are so many things to spend it on. Therefore, learning to save is an important skill. <blank id=\"26\"></blank>", zh: "对青少年来说，存钱可能很有挑战性，尤其是有那么多东西可以买。因此，学会储蓄是一项重要的技能。"},
        {en: "Opening a savings account is a smart first step. <blank id=\"27\"></blank> What makes it even better is that some accounts offer high interest rates(利率), which means the bank pays you just for keeping your money there. To open one, you may need a parent to go to the bank with you.", zh: "开设储蓄账户是明智的第一步。有些账户提供高利率，这意味着银行会因为你把钱存在那里而付给你利息。要开户，你可能需要父母陪你去银行。"},
        {en: "Another effective way is to stop yourself from buying things immediately. It's easy to see something you like and want to buy it right away. <blank id=\"28\"></blank> That is, write down the product, its price, and the date, then wait a full month before deciding to buy it. By doing so, you will turn a sudden want into a thoughtful choice.", zh: "另一个有效的方法是阻止自己立刻买东西。很容易看到喜欢的东西就想马上买。也就是说，写下产品、价格和日期，然后等整整一个月再决定是否购买。这样做，你会把一时冲动变成深思熟虑的选择。"},
        {en: "<blank id=\"29\"></blank> For example, if you earn ¥15, put ¥5 directly into savings. This method allows you to enjoy the rest while still building your savings for future goals. If you are saving for something big, you can choose to save even more.", zh: "例如，如果你赚了15元，直接把5元存入储蓄。这个方法让你在享受剩下的钱的同时，仍然为未来的目标积累储蓄。如果你在存钱买大件东西，你可以选择存更多。"},
        {en: "Finally, to have money to save, you need to make money. You can sell your old books and toys at the local flea market. You can also ask your parents if you can earn money by doing chores, such as washing the dishes or sweeping the floor. <blank id=\"30\"></blank>", zh: "最后，要有钱存，你需要赚钱。你可以在当地的跳蚤市场卖旧书和玩具。你也可以问问父母，你是否可以通过做家务来赚钱，比如洗碗或扫地。"}

</script>
<script>
var mode='test',step=false,curIdx=0,curSec=0,font='md';

function setMode(m){
  mode=m;
  var btns=document.querySelectorAll('.mb');
  for(var i=0;i<btns.length;i++){
    var b=btns[i];
    if(mode=='test' && b.textContent.indexOf('试题')>=0){
      b.classList.add('a');
    }else if(mode=='analysis' && b.textContent.indexOf('讲解')>=0){
      b.classList.add('a');
    }else{
      b.classList.remove('a');
    }
  }
  render();
}

function toggleStep(){
  step=!step;
  var sbEl=document.getElementById('stepBtn');
  if(step){sbEl.classList.add('a');}else{sbEl.classList.remove('a');}
  curIdx=0;
  render();
}

function setFont(s){
  font=s;
  document.body.className=s;
}

function getSecTotal(sec){
  if(sec.questions && sec.questions.length>0) return sec.questions.length;
  if(sec.answers && sec.answers.length>0) return sec.answers.length;
  return 0;
}

function initTabs(){
  var r=document.getElementById('tabRow');
  r.innerHTML='';
  var secs=EXAM_DATA.sections;
  for(var i=0;i<secs.length;i++){
    var d=document.createElement('div');
    d.className='tt'+(i===0?' a':'');
    d.textContent=secs[i].name;
    d.onclick=(function(idx){
      return function(){
        curSec=idx;
        curIdx=0;
        var tabs=document.querySelectorAll('.tt');
        for(var j=0;j<tabs.length;j++){
          if(j===idx){tabs[j].classList.add('a');}else{tabs[j].classList.remove('a');}
        }
        render();
      };
    })(i);
    r.appendChild(d);
  }
}

function render(){
  var sec=EXAM_DATA.sections[curSec];
  if(!sec) return;
  document.getElementById('leftP').innerHTML=renderLeft(sec);
  document.getElementById('rightP').innerHTML=renderRight(sec);
}

function renderLeft(sec){
  if(sec.id=='cloze') return rClozeL(sec);
  if(sec.id && sec.id.indexOf('reading')==0) return rReadL(sec);
  if(sec.id=='restore') return rRestoreL(sec);
  if(sec.id=='match') return rMatchL(sec);
  if(sec.id=='grammar') return rGramL(sec);
  return '<p>暂无</p>';
}

function renderRight(sec){
  if(sec.id=='cloze') return rClozeR(sec);
  if(sec.id && sec.id.indexOf('reading')==0) return rReadR(sec);
  if(sec.id=='restore') return rRestoreR(sec);
  if(sec.id=='match') return rMatchR(sec);
  if(sec.id=='grammar') return rGramR(sec);
  return '<p>暂无</p>';
}

/* ========== 完形填空 ========== */
function rClozeL(sec){
  var h='<div class="art">';
  var a=sec.article||'';
  var pa=a.split(/<blank id="(\d+)"><\/blank>/);
  for(var i=0;i<pa.length;i+=2){
    var t=pa[i];
    if(mode=='analysis'){
      h+=hClue(t,sec);
    }else{
      h+=esc(t);
    }
    if(i+1<pa.length){
      var n=parseInt(pa[i+1],10);
      var q=findQuestion(sec.questions,n);
      if(mode=='test'){
        h+='<span class="bx">['+n+']</span>';
      }else{
        var aw='';
        if(q && q.options && q.answer && q.options[q.answer]){
          aw=q.options[q.answer];
        }
        h+='<span class="bx h">'+n+'. '+aw+'</span>';
      }
    }
  }
  h+='</div>';
  return h;
}

function hClue(t,sec){
  var s=t;
  var qs=sec.questions||[];
  for(var qi=0;qi<qs.length;qi++){
    var q=qs[qi];
    if(q.clueWords && q.clueWords.length>0){
      for(var wi=0;wi<q.clueWords.length;wi++){
        var w=q.clueWords[wi];
        var re=escRegex(w);
        s=s.replace(new RegExp('('+re+')','gi'),'<span class="hl">$1</span>');
      }
    }
  }
  return s;
}

function rClozeR(sec){
  var qs=sec.questions||[];
  var total=qs.length;
  if(total===0) return '<p>暂无题目</p>';
  var st=0,en=total;
  if(step){
    st=Math.max(0,Math.min(curIdx,total-1));
    en=Math.min(total,st+1);
  }
  var h='';
  for(var i=st;i<en;i++){
    h+=r1Cloze(qs[i]);
  }
  if(step && total>1){
    h=sb(h,total,st);
  }
  return h;
}

function r1Cloze(q){
  var ia=(mode=='analysis');
  var ans=q.answer||'';
  var h='<div class="qi"><div class="qn">第'+q.num+'题</div>';
  if(q.stem) h+='<div class="qs">'+esc(q.stem)+'</div>';
  h+='<div class="op">';
  var lt=['A','B','C','D'];
  for(var k=0;k<lt.length;k++){
    var txt=q.options[lt[k]]||'';
    var cls='ot';
    if(ia && lt[k]===ans) cls+=' c';
    if(ia && lt[k]!==ans) cls+=' w';
    h+='<div class="'+cls+'">'+lt[k]+'. '+esc(txt)+'</div>';
  }
  h+='</div>';
  if(ia && q.analysis){
    h+='<div class="an"><div class="sti">考点：'+esc(q.point)+'</div><div class="stb">'+esc(q.analysis)+'</div>';
    if(q.distractors) h+='<div style="margin-top:4px;color:#888;font-size:.82em">干扰项分析：'+esc(q.distractors)+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

/* ========== 阅读理解 ========== */
function rReadL(sec){
  var ps=sec.paragraphs||[];
  var h='';
  for(var i=0;i<ps.length;i++){
    var p=ps[i];
    var enText=p.en||'';
    if(mode=='analysis'){
      enText=hReadKw(enText,sec);
    }else{
      enText=esc(enText);
    }
    h+='<div class="pb"><div class="pe">'+enText+'</div>';
    if(p.zh){
      h+='<div class="pz" id="tr_'+curSec+'_'+i+'">'+esc(p.zh)+'</div>';
    }
    h+='<button class="ht" onclick="togTr('+curSec+','+i+')">中译</button></div>';
  }
  return h;
}

function hReadKw(t,sec){
  var s=t;
  var qs=sec.questions||[];
  for(var qi=0;qi<qs.length;qi++){
    var q=qs[qi];
    if(q.evidenceKeywords && q.evidenceKeywords.length>0){
      for(var wi=0;wi<q.evidenceKeywords.length;wi++){
        var w=q.evidenceKeywords[wi];
        var re=escRegex(w);
        s=s.replace(new RegExp('('+re+')','gi'),'<span class="hl">$1<span class="cb">'+(q.num)+'</span></span>');
      }
    }
  }
  return s;
}

function rReadR(sec){
  var qs=sec.questions||[];
  var total=qs.length;
  if(total===0) return '<p>暂无题目</p>';
  var st=0,en=total;
  if(step){
    st=Math.max(0,Math.min(curIdx,total-1));
    en=Math.min(total,st+1);
  }
  var h='';
  for(var i=st;i<en;i++){
    h+=r1Read(qs[i]);
  }
  if(step && total>1){
    h=sb(h,total,st);
  }
  return h;
}

function r1Read(q){
  var ia=(mode=='analysis');
  var ans=q.answer||'';
  var h='<div class="qi"><div class="qn">第'+q.num+'题</div>';
  if(q.stem) h+='<div class="qs">'+esc(q.stem)+'</div>';
  h+='<div class="op">';
  var lt=['A','B','C','D'];
  for(var k=0;k<lt.length;k++){
    var txt=q.options[lt[k]]||'';
    var cls='ot';
    if(ia && lt[k]===ans) cls+=' c';
    if(ia && lt[k]!==ans) cls+=' w';
    h+='<div class="'+cls+'">'+lt[k]+'. '+esc(txt)+'</div>';
  }
  h+='</div>';
  if(ia && q.analysis){
    h+='<div class="an"><div class="sti">考点：'+esc(q.point)+'</div><div class="stb">'+esc(q.analysis)+'</div>';
    if(q.evidence) h+='<div class="nt">原文依据：'+esc(q.evidence)+'</div>';
    if(q.distractors) h+='<div style="margin-top:4px;color:#888;font-size:.82em">干扰项分析：'+esc(q.distractors)+'</div>';
    h+='</div>';
  }
  /* 结构题（第25题）特殊处理 */
  if(q.num===25 && ia){
    h+='<div class="an" style="border-left-color:#e67e22"><div class="sti">📐 篇章结构分析</div><div class="stb">'+esc(q.analysis)+'</div></div>';
  }
  h+='</div>';
  return h;
}

function togTr(s,p){
  var el=document.getElementById('tr_'+s+'_'+p);
  if(el) el.classList.toggle('s');
}

/* ========== 还原句子 ========== */
function rRestoreL(sec){
  var ps=sec.paragraphs||[];
  var h='';
  for(var i=0;i<ps.length;i++){
    var p=ps[i];
    var en=p.en||'';
    var pa=en.split(/<blank id="(\d+)"><\/blank>/);
    var eh='';
    for(var j=0;j<pa.length;j+=2){
      eh+=esc(pa[j]);
      if(j+1<pa.length){
        var n=parseInt(pa[j+1],10);
        if(mode=='test'){
          eh+='<span class="bx d">['+n+']</span>';
        }else{
          var ansObj=findAnswer(sec.answers,n);
          var lt=ansObj?ansObj.answer:'';
          var optTxt='';
          if(lt && sec.options){
            for(var oi=0;oi<sec.options.length;oi++){
              if(sec.options[oi].id===lt){
                optTxt=sec.options[oi].text;
                break;
              }
            }
          }
          eh+='<span style="display:inline-block;padding:2px 6px;background:#e8f8f0;border:2px solid #27ae60;border-radius:5px;margin:0 3px;font-size:.88em;color:#27ae60;font-weight:600;vertical-align:middle">'+n+'. '+lt+'. '+esc(optTxt)+'</span>';
        }
      }
    }
    h+='<div class="pb"><div class="pe">'+eh+'</div>';
    if(p.zh){
      h+='<div class="pz" id="tr_'+curSec+'_'+i+'">'+esc(p.zh)+'</div>';
    }
    h+='<button class="ht" onclick="togTr('+curSec+','+i+')">中译</button></div>';
  }
  return h;
}

function rRestoreR(sec){
  if(mode=='test'){
    var opts=sec.options||[];
    var h='<div style="font-size:.9em"><div style="font-weight:600;margin-bottom:8px;color:#555">选择恰当的选项填入文中空缺处：</div>';
    for(var i=0;i<opts.length;i++){
      h+='<div class="ot" style="margin-bottom:6px"><b>'+opts[i].id+'.</b> '+esc(opts[i].text)+'</div>';
    }
    return h+'</div>';
  }
  var ansArr=sec.answers||[];
  var total=ansArr.length;
  if(total===0) return '<p>暂无</p>';
  var st=0,en=total;
  if(step){
    st=Math.max(0,Math.min(curIdx,total-1));
    en=Math.min(total,st+1);
  }
  var h='';
  for(var i=st;i<en;i++){
    var a=ansArr[i];
    h+='<div class="qi"><div class="qn">第'+a.blank+'题 <span style="color:#27ae60;font-weight:600">答案：'+a.answer+'</span></div>';
    if(a.analysis) h+='<div class="stb" style="margin-bottom:5px">解析：'+esc(a.analysis)+'</div>';
    if(a.clueBefore) h+='<div style="font-size:.82em;color:#555;margin-bottom:3px"><b>前文线索：</b>'+esc(a.clueBefore)+'</div>';
    if(a.clueAfter) h+='<div style="font-size:.82em;color:#555;margin-bottom:3px"><b>后文线索：</b>'+esc(a.clueAfter)+'</div>';
    if(a.clueKeywords && a.clueKeywords.length>0){
      h+='<div style="font-size:.82em;color:#e74c3c"><b>关键词：</b>'+a.clueKeywords.join('、')+'</div>';
    }
    h+='</div>';
  }
  if(step && total>1){
    h=sb(h,total,st);
  }
  return h;
}

/* ========== 信息匹配 ========== */
function rMatchL(sec){
  var ps=sec.left||[];
  var h='<div style="font-size:.95em;line-height:1.9">';
  for(var i=0;i<ps.length;i++){
    var p=ps[i];
    h+='<div class="pb"><div style="display:inline-flex;align-items:center;gap:4px;margin-bottom:3px"><span class="cb">'+p.num+'</span><span style="font-weight:600;color:#3498db">'+esc(p.id)+'</span></div><div style="font-size:.88em;color:#555">'+esc(p.text)+'</div>';
    if(p.zh){
      h+='<div class="pz" id="mt_'+curSec+'_'+i+'">'+esc(p.zh)+'</div>';
    }
    h+='<button class="ht" onclick="togMt('+curSec+','+i+')">中译</button></div>';
  }
  return h+'</div>';
}

function togMt(s,i){
  var el=document.getElementById('mt_'+s+'_'+i);
  if(el) el.classList.toggle('s');
}

function rMatchR(sec){
  var courses=sec.right||[];
  if(mode=='test'){
    var h='<div style="font-size:.88em"><div style="font-weight:600;margin-bottom:8px;color:#555">课程选项：</div>';
    for(var i=0;i<courses.length;i++){
      var c=courses[i];
      h+='<div class="ot" style="margin-bottom:6px"><b>['+c.id+'] '+esc(c.title)+'</b><br><span style="color:#555;font-size:.9em">'+esc(c.text)+'</span></div>';
    }
    return h+'</div>';
  }
  /* 讲解模式：按答案顺序，左边需求+右边完整课程描述+线索词高亮 */
  var ansArr=sec.answers||[];
  var total=ansArr.length;
  var st=0,en=total;
  if(step){
    st=Math.max(0,Math.min(curIdx,total-1));
    en=Math.min(total,st+1);
  }
  var h='';
  for(var i=st;i<en;i++){
    var a=ansArr[i];
    var person=findPerson(sec.left,a.person);
    var course=findCourse(courses,a.match);
    if(!person || !course) continue;
    h+='<div class="ot c" style="margin-bottom:8px">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span class="cb">'+person.num+'</span><span style="font-weight:600">'+esc(person.id)+'</span><span style="color:#999">→</span><span style="font-weight:600;color:#27ae60">'+a.match+'. '+esc(course.title)+'</span></div>';
    /* 左侧需求 + 线索词高亮 */
    h+='<div style="font-size:.85em;color:#333;margin-bottom:4px">';
    if(a.matchKeywords && a.matchKeywords.left){
      h+=hKWHl(person.text,a.matchKeywords.left);
    }else{
      h+=esc(person.text);
    }
    h+='</div>';
    /* 右侧完整课程描述 + 线索词高亮 */
    h+='<div style="font-size:.85em;color:#555;padding-left:12px;border-left:2px solid #27ae60">';
    h+='<b style="color:#27ae60">'+a.match+'. '+esc(course.title)+'</b><br>';
    if(a.matchKeywords && a.matchKeywords.right){
      h+=hKWHl(course.text,a.matchKeywords.right);
    }else{
      h+=esc(course.text);
    }
    h+='</div>';
    /* 解析 */
    if(a.analysis) h+='<div style="font-size:.82em;color:#888;margin-top:4px;padding:4px 8px;background:#f0faf0;border-radius:3px">'+esc(a.analysis)+'</div>';
    h+='</div>';
  }
  if(step && total>1){
    h=sb(h,total,st);
  }
  return h;
}

/* 在原文本中对关键词列表做高亮 */
function hKWHl(text,kwArr){
  if(!text) return '';
  var s=esc(text);
  for(var i=0;i<kwArr.length;i++){
    var w=kwArr[i];
    var re=escRegex(w);
    s=s.replace(new RegExp('('+re+')','gi'),'<span class="hl">$1</span>');
  }
  return s;
}

function hMatchKw(pt,ct,ans){
  var mkw=ans.matchKeywords;
  if(!mkw) return '';
  var leftText=pt;
  var rightText=ct;
  if(mkw.left){
    for(var i=0;i<mkw.left.length;i++){
      var w=mkw.left[i];
      var re=escRegex(w);
      leftText=leftText.replace(new RegExp('('+re+')','gi'),'<span class="hl">$1</span>');
    }
  }
  if(mkw.right){
    for(var i=0;i<mkw.right.length;i++){
      var w=mkw.right[i];
      var re=escRegex(w);
      rightText=rightText.replace(new RegExp('('+re+')','gi'),'<span class="hl">$1</span>');
    }
  }
  return '<b>需求：</b>'+leftText+'<br><b>课程：</b>'+rightText;
}

function findPerson(arr,id){
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===id) return arr[i];
  }
  return null;
}

function findCourse(arr,id){
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===id) return arr[i];
  }
  return null;
}

function rGramLine(s){
  if(!s) return '';
  return s;
}

/* ========== 语法填空 ========== */
function rGramL(sec){
  var h='<div class="art">';
  var a=sec.article||'';
  var pa=a.split(/<blank id="(\d+)"(?: hint="([^"]*)")?><\/blank>/);
  for(var i=0;i<pa.length;i+=3){
    var t=pa[i];
    h+=esc(t);
    if(i+1<pa.length){
      var n=parseInt(pa[i+1],10);
      var hint=pa[i+2]||'';
      var q=findQuestion(sec.questions,n);
      var aw=q?q.answer:'';
      if(mode=='test'){
        /* 试题模式：题号[ ](提示词) — 提示词字体与正文一致 */
        h+='<span style="display:inline;vertical-align:middle;margin:0 2px">';
        h+='<span class="bx">'+n+' [ ]</span>';
        if(hint){
          h+=' <span style="font-size:1em;color:#333;font-family:inherit">('+hint+')</span>';
        }
        h+='</span>';
      }else{
        /* 讲解模式：红色框显示答案，隐藏提示词 */
        h+='<span style="display:inline;vertical-align:middle;margin:0 2px"><span class="bx r">'+n+'. '+esc(aw)+'</span></span>';
      }
    }
  }
  h+='</div>';
  return h;
}

function rGramR(sec){
  var qs=sec.questions||[];
  var total=qs.length;
  if(mode=='test'){
    /* 语法填空试题模式：右侧留白 */
    return '<div style="text-align:center;color:#bbb;padding:40px 0;font-size:.9em">试题模式下，请直接在左侧文章中作答</div>';
  }
  if(total===0) return '<p>暂无题目</p>';
  var st=0,en=total;
  if(step){
    st=Math.max(0,Math.min(curIdx,total-1));
    en=Math.min(total,st+1);
  }
  var h='';
  for(var i=st;i<en;i++){
    var q=qs[i];
    h+='<div class="qi"><div class="qn">第'+q.num+'题';
    if(q.point){
      h+=' <span class="opti">'+esc(q.point)+'</span>';
    }
    h+='</div>';
    h+='<div style="font-weight:600;color:#e74c3c;margin-bottom:4px;font-size:.9em">答案：'+esc(q.answer)+'</div>';
    if(q.sentence) h+='<div class="stb" style="margin-bottom:5px">'+rGramLine(q.sentence)+'</div>';
    if(q.sentenceAnalysis) h+='<div style="font-size:.82em;color:#555;margin-bottom:5px"><b>句子分析：</b>'+rGramLine(q.sentenceAnalysis)+'</div>';
    if(q.analysis) h+='<div class="an"><div class="stb">'+esc(q.analysis)+'</div></div>';
    if(q.keywords && q.keywords.length>0){
      h+='<div style="font-size:.82em;color:#e74c3c;margin-top:4px"><b>关键词：</b>'+q.keywords.join('、')+'</div>';
    }
    h+='</div>';
  }
  if(step && total>1){
    h=sb(h,total,st);
  }
  return h;
}

/* ========== 辅助函数 ========== */
function esc(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escRegex(s){
  if(!s) return '';
  return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function findQuestion(qs,num){
  if(!qs) return null;
  for(var i=0;i<qs.length;i++){
    if(qs[i].num===num) return qs[i];
  }
  return null;
}

function findAnswer(ansArr,n){
  if(!ansArr) return null;
  for(var i=0;i<ansArr.length;i++){
    if(ansArr[i].blank===n) return ansArr[i];
  }
  return null;
}

function sb(inner,total,cur){
  return '<div class="sbr s"><button class="sb" onclick="sp()">&#9664;</button><span style="font-size:.82em;color:#666">'+(cur+1)+'/'+total+'</span><button class="sb" onclick="sn()">&#9654;</button></div>'+inner;
}

function sp(){
  if(curIdx>0){
    curIdx--;
    render();
  }
}

function sn(){
  var sec=EXAM_DATA.sections[curSec];
  var total=getSecTotal(sec);
  if(curIdx<total-1){
    curIdx++;
    render();
  }
}

document.addEventListener('DOMContentLoaded',function(){
  initTabs();
  render();
});
</script>
</body>
</html>
